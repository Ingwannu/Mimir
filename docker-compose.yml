services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mimir}
      POSTGRES_USER: ${POSTGRES_USER:-mimir}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mimir}
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant
    restart: unless-stopped
    volumes:
      - ./.data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -lc ':</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: "@mimir/api"
    environment:
      NODE_ENV: production
      WORKSPACE_ID: ${WORKSPACE_ID:-workspace_demo}
      WORKSPACE_SLUG: ${WORKSPACE_SLUG:-mimir}
      WORKSPACE_NAME: ${WORKSPACE_NAME:-Mimir}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      WEB_SESSION_SECRET: ${WEB_SESSION_SECRET:-change-me-too}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY:-change-me-secret-key}
      VECTOR_BACKEND: ${VECTOR_BACKEND:-qdrant}
      PGVECTOR_TABLE: ${PGVECTOR_TABLE:-pgvector_chunk_embeddings}
      DATABASE_URL: ${DATABASE_URL:-postgresql://mimir:mimir@postgres:5432/mimir}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-mimir_chunks}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_ANSWER_MODEL: ${OPENAI_ANSWER_MODEL:-gpt-5-nano}
      OPENAI_FALLBACK_MODEL: ${OPENAI_FALLBACK_MODEL:-gpt-5-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_STORE: ${OPENAI_STORE:-false}
      CHUNK_SIZE: ${CHUNK_SIZE:-700}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-120}
      MAX_CONTEXT_CHUNKS: ${MAX_CONTEXT_CHUNKS:-4}
      API_PORT: 4000
      PUBLIC_API_BASE_URL: http://api:4000
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "127.0.0.1:${API_PORT:-14000}:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:4000/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: "@mimir/web"
    environment:
      NODE_ENV: production
      WEB_API_BASE_URL: http://api:4000
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      WEB_SESSION_SECRET: ${WEB_SESSION_SECRET:-change-me-too}
      PORT: 3000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-13000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  bot:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: "@mimir/bot"
    environment:
      NODE_ENV: production
      WORKSPACE_ID: ${WORKSPACE_ID:-workspace_demo}
      WORKSPACE_SLUG: ${WORKSPACE_SLUG:-mimir}
      WORKSPACE_NAME: ${WORKSPACE_NAME:-Mimir}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      WEB_SESSION_SECRET: ${WEB_SESSION_SECRET:-change-me-too}
      OPENAI_ANSWER_MODEL: ${OPENAI_ANSWER_MODEL:-gpt-5-nano}
      OPENAI_FALLBACK_MODEL: ${OPENAI_FALLBACK_MODEL:-gpt-5-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_STORE: ${OPENAI_STORE:-false}
      PUBLIC_API_BASE_URL: http://api:4000
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      BOT_HEALTH_PORT: 4100
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BOT_HEALTH_PORT:-14100}:4100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:4100/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: "@mimir/worker"
    environment:
      NODE_ENV: production
      WORKSPACE_ID: ${WORKSPACE_ID:-workspace_demo}
      WORKSPACE_SLUG: ${WORKSPACE_SLUG:-mimir}
      WORKSPACE_NAME: ${WORKSPACE_NAME:-Mimir}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY:-change-me-secret-key}
      VECTOR_BACKEND: ${VECTOR_BACKEND:-qdrant}
      PGVECTOR_TABLE: ${PGVECTOR_TABLE:-pgvector_chunk_embeddings}
      DATABASE_URL: ${DATABASE_URL:-postgresql://mimir:mimir@postgres:5432/mimir}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-mimir_chunks}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_ANSWER_MODEL: ${OPENAI_ANSWER_MODEL:-gpt-5-nano}
      OPENAI_FALLBACK_MODEL: ${OPENAI_FALLBACK_MODEL:-gpt-5-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_STORE: ${OPENAI_STORE:-false}
      CHUNK_SIZE: ${CHUNK_SIZE:-700}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-120}
      MAX_CONTEXT_CHUNKS: ${MAX_CONTEXT_CHUNKS:-4}
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-3000}
      WORKER_HEALTH_PORT: 4200
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WORKER_HEALTH_PORT:-14200}:4200"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:4200/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
